<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #050E1B; font-family: 'DM Sans', sans-serif; }
    #root { min-height: 100vh; }
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap');

  <style>

        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:#050E1B;}
        input:focus,select:focus{border-color:#16A34A!important;outline:none;}
        ::-webkit-scrollbar{width:5px;height:5px;}
        ::-webkit-scrollbar-track{background:#071A0E;}
        ::-webkit-scrollbar-thumb{background:#14532D;border-radius:3px;}

        .modebtns button:first-child{border-radius:6px 0 0 6px;}

<body>
  <div id="root"></div>
  <script type="text/javascript">
    const { useState, useEffect } = React;

    const storage = {
      get:    async (k)    => { try { const v=localStorage.getItem(k); return v?{value:v}:null; } catch(e){return null;} },
      set:    async (k,v)  => { try { localStorage.setItem(k,v); return {key:k,value:v}; } catch(e){return null;} },
      remove: async (k)    => { try { localStorage.removeItem(k); return {key:k,deleted:true}; } catch(e){return null;} },
      list:   async (pfx)  => { try { const ks=Object.keys(localStorage).filter(k=>!pfx||k.startsWith(pfx)); return {keys:ks}; } catch(e){return {keys:[]};} },
    };
// ===================== CONSTANTS =====================
const TEAM_COLORS = { A: "#00C2E0", B: "#FF6B35", C: "#2ECC71", D: "#F1C40F" };
const ROLE_META = {
    guard: { label: "Lifeguard", color: "#00C2E0", dark: "#002A36" },
    hlg: { label: "Head Lifeguard", color: "#F1C40F", dark: "#2E2700" },
};
const DAY_META = {
    closed: { label: "Closed", color: "#5A6A7A", bg: "#07090E" },
    slow: { label: "Slow", color: "#2ECC71", bg: "#030F06" },
    normal: { label: "Normal", color: "#00C2E0", bg: "#030C14" },
    busy: { label: "Busy", color: "#F97316", bg: "#120700" },
};
const CHAIR_META = {
    2: { label: "2 Chair", desc: "Slide + Dive", color: "#2ECC71" },
    3: { label: "3 Chair", desc: "Slide + Dive + Chair4", color: "#00C2E0" },
    4: { label: "4 Chair", desc: "Full 4-chair rotation", color: "#F97316" },
};
// Slot definitions grouped by chair mode
const SLOT_GROUPS_BY_MODE = {
    2: [
        { group: "Water Pair", color: "#7EC8E3", slots: [
                { id: "SL", label: "Slide", stations: "Slide" },
                { id: "DV", label: "Diving Board", stations: "Diving Board" },
            ] },
        { group: "Head Lifeguard", color: "#F1C40F", slots: [
                { id: "HLG1", label: "Head LG", stations: "Emergency backup / Float" },
            ] },
    ],
    3: [
        { group: "Active Stations", color: "#7EC8E3", slots: [
                { id: "SL", label: "Slide", stations: "Slide" },
                { id: "DV", label: "Diving Board", stations: "Diving Board" },
                { id: "C4", label: "Chair 4 (Walking)", stations: "Chair 4 - walking patrol" },
            ] },
        { group: "Head Lifeguard", color: "#F1C40F", slots: [
                { id: "HLG1", label: "Head LG", stations: "Emergency backup / Float" },
            ] },
    ],
    4: [
        { group: "Team A", color: "#00C2E0", team: "A", slots: [
                { id: "A1", label: "Guard 1", stations: "Chair 1 / Slide", team: "A" },
                { id: "A2", label: "Guard 2", stations: "Chair 4 / Diving Board", team: "A" },
            ] },
        { group: "Team B", color: "#FF6B35", team: "B", slots: [
                { id: "B1", label: "Guard 1", stations: "Chair 1 / Slide", team: "B" },
                { id: "B2", label: "Guard 2", stations: "Chair 4 / Diving Board", team: "B" },
            ] },
        { group: "Team C", color: "#2ECC71", team: "C", slots: [
                { id: "C1", label: "Guard 1", stations: "Chair 1 / Slide", team: "C" },
                { id: "C2", label: "Guard 2", stations: "Chair 4 / Diving Board", team: "C" },
            ] },
        { group: "Team D", color: "#F1C40F", team: "D", slots: [
                { id: "D1", label: "Guard 1", stations: "Chair 1 / Slide", team: "D" },
                { id: "D2", label: "Guard 2", stations: "Chair 4 / Diving Board", team: "D" },
            ] },
        { group: "Head Lifeguard", color: "#F1C40F", slots: [
                { id: "HLG1", label: "Head LG 1", stations: "Emergency backup / Float" },
                { id: "HLG2", label: "Head LG 2", stations: "Emergency backup / Float" },
            ] },
    ],
};
const BOOM_GROUP = {
    group: "Boom Extension", color: "#E879F9", slots: [
        { id: "E", label: "Boom Guard E", stations: "Chair 5 / Mushroom / Break support" },
        { id: "F", label: "Boom Guard F", stations: "Chair 5 / Mushroom / Break support" },
        { id: "G", label: "Boom Guard G", stations: "Chair 5 / Mushroom / Break support" },
    ],
};
// Default shift times per slot
const DEFAULT_TIMES = {
    A1: { s: 720, e: 1080 }, A2: { s: 720, e: 1080 },
    B1: { s: 720, e: 1125 }, B2: { s: 720, e: 1125 },
    C1: { s: 720, e: 1125 }, C2: { s: 720, e: 1125 },
    D1: { s: 840, e: 1125 }, D2: { s: 840, e: 1125 },
    HLG1: { s: 660, e: 1140 }, HLG2: { s: 660, e: 1140 },
    SL: { s: 720, e: 1125 }, DV: { s: 720, e: 1125 }, C4: { s: 720, e: 1125 },
    E: { s: 780, e: 1020 }, F: { s: 780, e: 1020 }, G: { s: 780, e: 1020 },
};
const CHANGE_REASONS = [
    "Guard requested change",
    "Guard called out - illness",
    "Guard called out - personal",
    "Schedule conflict",
    "Coverage swap",
    "Manager adjustment",
    "New guard added",
    "Other",
];
// ===================== HELPERS =====================
function uid() { return Math.random().toString(36).slice(2, 9) + Date.now().toString(36); }
function fmtTime(mins) {
    const h = Math.floor(mins / 60), m = mins % 60;
    return (h > 12 ? h - 12 : h) + ":" + (String(m).padStart(2, "0")) + " " + (h >= 12 ? "PM" : "AM");
}
function fmtDate(ds) {
    return new Date(ds + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}
function fmtDateShort(ds) {
    return new Date(ds + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function fmtTs(ts) {
    return new Date(ts).toLocaleDateString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}
function addDays(ds, n) {
    const d = new Date(ds + "T12:00:00");
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0, 10);
}
function gen14Days(start) { return Array.from({ length: 14 }, (_, i) => addDays(start, i)); }
function getThisMonday() {
    const d = new Date(), day = d.getDay();
    d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
    return d.toISOString().slice(0, 10);
}
function todayStr() { return new Date().toISOString().slice(0, 10); }
const TIME_OPTS = (() => {
    const o = [];
    for (let h = 6; h <= 22; h++)
        for (let m = 0; m < 60; m += 15)
            o.push({ val: h * 60 + m, label: fmtTime(h * 60 + m) });
    return o;
})();
// ===================== SMALL COMPONENTS =====================
function RolePill({ role }) {
    const m = ROLE_META[role] || ROLE_META.core;
    return React.createElement("span", { style: { background: m.dark, border: "1px solid " + m.color + "66", color: m.color, borderRadius: "4px", padding: "2px 8px", fontSize: "10px", letterSpacing: "1px", whiteSpace: "nowrap" } }, m.label);
}
function TeamDot({ team, size }) {
    if (!team)
        return null;
    const sz = size || 20;
    return React.createElement("span", { style: { background: TEAM_COLORS[team] || "#666", color: "#000", width: sz, height: sz, borderRadius: "50%", display: "inline-flex", alignItems: "center", justifyContent: "center", fontFamily: "'Bebas Neue'", fontSize: sz * 0.6, fontWeight: 900, flexShrink: 0 } }, team);
}
function DayPill({ type }) {
    const m = DAY_META[type] || DAY_META.normal;
    return React.createElement("span", { style: { background: m.bg, border: "1px solid " + m.color + "55", color: m.color, borderRadius: "4px", padding: "2px 7px", fontSize: "10px", letterSpacing: "1px", whiteSpace: "nowrap" } }, m.label);
}
function HoursBar({ filled, needed, color }) {
    const pct = needed > 0 ? Math.min(100, (filled / needed) * 100) : 0;
    return React.createElement("div", { style: { background: "#08121E", borderRadius: "3px", height: "5px", overflow: "hidden", marginTop: "4px" } },
        React.createElement("div", { style: { width: pct + "%", height: "100%", background: color || "#2ECC71", borderRadius: "3px", transition: "width .3s" } }));
}
// ===================== MAIN APP =====================
function App() {
    const [tab, setTab] = useState("roster");
    const [roster, setRoster] = useState([]);
    const [periodStart, setPeriodStart] = useState(getThisMonday);
    const [dayData, setDayData] = useState({});
    const [selDay, setSelDay] = useState(null);
    const [logs, setLogs] = useState([]);
    const [rate, setRate] = useState("");
    const [mgr, setMgr] = useState("");
    const [loaded, setLoaded] = useState(false);
    // Roster form
    const [form, setForm] = useState({ name: "", role: "guard", notes: "" });
    const [editingId, setEditingId] = useState(null);
    const [showCsv, setShowCsv] = useState(false);
    const [csvText, setCsvText] = useState("");
    const [showInactive, setShowInactive] = useState(false);
    // Change modal
    const [pending, setPending] = useState(null);
    const [selReason, setSelReason] = useState("");
    const [otherText, setOtherText] = useState("");
    // Log filter
    const [logFilter, setLogFilter] = useState("");
    // ---- Storage ----
    useEffect(() => {
        (async () => {
            try {
                const r = await storage.get("planner-roster");
                if (r)
                    setRoster(JSON.parse(r.value));
            }
            catch (e) { }
            try {
                const r = await storage.get("planner-days");
                if (r)
                    setDayData(JSON.parse(r.value));
            }
            catch (e) { }
            try {
                const r = await storage.get("planner-logs");
                if (r)
                    setLogs(JSON.parse(r.value));
            }
            catch (e) { }
            try {
                const r = await storage.get("planner-meta");
                if (r) {
                    const v = JSON.parse(r.value);
                    if (v.ps)
                        setPeriodStart(v.ps);
                    if (v.rate)
                        setRate(v.rate);
                    if (v.mgr)
                        setMgr(v.mgr);
                }
            }
            catch (e) { }
            setLoaded(true);
        })();
    }, []);
    useEffect(() => { if (loaded)
        storage.set("planner-roster", JSON.stringify(roster)).catch(() => { }); }, [roster, loaded]);
    useEffect(() => { if (loaded)
        storage.set("planner-days", JSON.stringify(dayData)).catch(() => { }); }, [dayData, loaded]);
    useEffect(() => { if (loaded)
        storage.set("planner-logs", JSON.stringify(logs)).catch(() => { }); }, [logs, loaded]);
    useEffect(() => { if (loaded)
        storage.set("planner-meta", JSON.stringify({ ps: periodStart, rate, mgr })).catch(() => { }); }, [periodStart, rate, mgr, loaded]);
    const days14 = gen14Days(periodStart);
    // ---- Day data helpers ----
    function gdd(ds) {
        return dayData[ds] || { dayType: "normal", chairMode: 4, boomActive: false, boomStart: 780, boomEnd: 1020, slots: {} };
    }
    function setDayField(ds, field, val) {
        setDayData(p => (Object.assign(Object.assign({}, p), { [ds]: Object.assign(Object.assign({}, gdd(ds)), { [field]: val }) })));
    }
    function getGroups(ds) {
        const d = gdd(ds);
        const base = SLOT_GROUPS_BY_MODE[d.chairMode] || [];
        if (d.boomActive && d.chairMode === 4)
            return [...base, BOOM_GROUP];
        return base;
    }
    function getAllSlotIds(ds) {
        return getGroups(ds).flatMap(g => g.slots.map(s => s.id));
    }
    function getAsgns(ds, sid) { return gdd(ds).slots[sid] || []; }
    function setAsgns(ds, sid, asgns) {
        const d = gdd(ds);
        setDayData(p => (Object.assign(Object.assign({}, p), { [ds]: Object.assign(Object.assign({}, d), { slots: Object.assign(Object.assign({}, d.slots), { [sid]: asgns }) }) })));
    }
    function getDayStats(ds) {
        const d = gdd(ds);
        if (d.dayType === "closed")
            return null;
        const sids = getAllSlotIds(ds);
        let needed = sids.length, filled = 0, confHours = 0;
        for (const sid of sids) {
            const asgns = getAsgns(ds, sid);
            if (asgns.some(a => a.guardId))
                filled++;
            asgns.filter(a => a.confirmed && a.guardId).forEach(a => confHours += (a.end - a.start) / 60);
        }
        return { needed, filled, confHours, cost: confHours * (parseFloat(rate) || 0), gap: filled < needed };
    }
    // ---- Assignment handling ----
    function handleGuardChange(ds, sid, idx, newGid) {
        const cur = getAsgns(ds, sid)[idx];
        // Only require reason if changing a guard that was already confirmed
        if ((cur && cur.confirmed) && cur.guardId && cur.guardId !== newGid) {
            setPending({ ds, sid, idx, newGid, oldGid: cur.guardId });
            setSelReason("");
            setOtherText("");
            return;
        }
        applyChange(ds, sid, idx, newGid, null);
    }
    function applyChange(ds, sid, idx, newGid, logEntry) {
        const cur = getAsgns(ds, sid);
        const def = DEFAULT_TIMES[sid] || { s: 720, e: 1125 };
        let next;
        if (idx >= cur.length) {
            next = [...cur, { guardId: newGid, start: def.s, end: def.e, confirmed: false }];
        }
        else {
            next = cur.map((a, i) => i === idx ? Object.assign(Object.assign({}, a), { guardId: newGid }) : a);
        }
        setAsgns(ds, sid, next);
        if (logEntry)
            setLogs(p => [logEntry, ...p]);
        setPending(null);
    }
    function confirmChange() {
        if (!selReason)
            return;
        if (selReason === "Other" && !otherText.trim())
            return;
        const { ds, sid, idx, newGid, oldGid } = pending;
        const oldG = roster.find(g => g.id === oldGid);
        const newG = roster.find(g => g.id === newGid);
        const entry = {
            id: uid(), timestamp: Date.now(), scheduleDate: ds, slotId: sid, idx,
            action: newGid ? (oldGid ? "modified" : "assigned") : "removed",
            oldGid, oldName: (oldG && oldG.name) || "(none)",
            newGid, newName: (newG && newG.name) || (newGid ? "Unknown" : "(removed)"),
            reason: selReason === "Other" ? otherText : selReason,
            mgr: mgr || "?",
        };
        applyChange(ds, sid, idx, newGid, entry);
    }
    function updAsgn(ds, sid, idx, field, val) {
        const next = getAsgns(ds, sid).map((a, i) => i === idx ? Object.assign(Object.assign({}, a), { [field]: val }) : a);
        setAsgns(ds, sid, next);
    }
    function addSplit(ds, sid) {
        const cur = getAsgns(ds, sid);
        if (cur.length >= 2)
            return;
        const def = DEFAULT_TIMES[sid] || { s: 720, e: 1125 };
        setAsgns(ds, sid, [...cur, { guardId: null, start: def.s, end: def.e, confirmed: false }]);
    }
    function removeSplit(ds, sid, idx) {
        setAsgns(ds, sid, getAsgns(ds, sid).filter((_, i) => i !== idx));
    }
    // ---- Roster helpers ----
    const activeGuards = roster.filter(g => g.active !== false);
    const inactiveGuards = roster.filter(g => g.active === false);
    function submitGuard() {
        if (!form.name.trim())
            return;
        if (editingId) {
            setRoster(p => p.map(g => g.id === editingId ? Object.assign(Object.assign(Object.assign({}, g), form), { name: form.name.trim() }) : g));
            setEditingId(null);
        }
        else {
            setRoster(p => [...p, { id: uid(), name: form.name.trim(), role: form.role, notes: form.notes, active: true }]);
        }
        setForm({ name: "", role: "guard", notes: "" });
    }
    function startEdit(g) {
        setEditingId(g.id);
        setForm({ name: g.name, role: g.role, notes: g.notes || "" });
    }
    // ---- CSV Import ----
    function importCsv() {
        const lines = csvText.split("\n").map(l => l.trim()).filter(Boolean);
        const added = [];
        for (const line of lines) {
            // Support: "Name" or "Name, role" or "Name, hlg"
            const parts = line.split(",").map(s => s.trim());
            const name = parts[0];
            if (!name)
                continue;
            const rawRole = (parts[1] || "").toLowerCase();
            const role = rawRole.includes("head") || rawRole === "hlg" ? "hlg" : "guard";
            // Skip duplicates
            if (roster.find(g => g.active !== false && g.name.toLowerCase() === name.toLowerCase()))
                continue;
            added.push({ id: uid(), name, role, notes: "", active: true });
        }
        if (added.length > 0)
            setRoster(p => [...p, ...added]);
        setCsvText("");
        setShowCsv(false);
        alert(added.length + " guard" + (added.length !== 1 ? "s" : "") + " added.");
    }
    function deactivate(id) { setRoster(p => p.map(g => g.id === id ? Object.assign(Object.assign({}, g), { active: false }) : g)); }
    function reactivate(id) { setRoster(p => p.map(g => g.id === id ? Object.assign(Object.assign({}, g), { active: true }) : g)); }
    // ---- Period stats ----
    const periodStats = days14.reduce((acc, ds) => {
        const s = getDayStats(ds);
        if (s) {
            acc.hours += s.confHours;
            acc.cost += s.cost;
            acc.workDays++;
            if (s.gap)
                acc.gaps++;
        }
        return acc;
    }, { hours: 0, cost: 0, workDays: 0, gaps: 0 });
    // ---- Change log ----
    const guardChangeCounts = {};
    logs.forEach(l => { if (l.oldGid)
        guardChangeCounts[l.oldGid] = (guardChangeCounts[l.oldGid] || 0) + 1; });
    const filteredLogs = logs.filter(l => {
        if (!logFilter)
            return true;
        const f = logFilter.toLowerCase();
        return (l.oldName && l.oldName.toLowerCase().includes(f)) || (l.newName && l.newName.toLowerCase().includes(f)) || (l.slotId && l.slotId.toLowerCase().includes(f)) || (l.scheduleDate && l.scheduleDate.includes(f)) || (l.reason && l.reason.toLowerCase().includes(f));
    });
    // ---- Selected day ----
    const sd = selDay;
    const sdd = sd ? gdd(sd) : null;
    const sdGroups = sd ? getGroups(sd) : [];
    // ---- Styles ----
    const INP = { background: "#0D1E35", border: "1px solid #1B3A6B", borderRadius: "6px", padding: "7px 10px", color: "#C8E0F0", fontSize: "13px", fontFamily: "'DM Sans',sans-serif", width: "100%" };
    const SEL = Object.assign(Object.assign({}, INP), { cursor: "pointer" });
    function BTN(bg, col, extra) { return Object.assign({ cursor: "pointer", border: "none", borderRadius: "6px", padding: "8px 16px", background: bg, color: col, fontFamily: "'DM Sans',sans-serif", fontSize: "12px", fontWeight: 700, letterSpacing: "1px" }, (extra || {})); }
    // ---- Push to Tracker ----
    const [pushStatus, setPushStatus] = useState(null); // null | 'ok' | 'err'
    async function pushToTracker(ds) {
        try {
            const d = gdd(ds);
            // Build guards map: team -> [seg0, seg1] where each seg is array of {name,start,end}
            const guardsOut = {};
